# cmd pour lancer en dev: docker compose --profile dev up -d
services:
  # -----------------------------
  # Base de données (PostgreSQL)
  # -----------------------------
  postgres:
    image: postgres:15
    container_name: ft_transcendence_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST} 
      POSTGRES_PORT: ${POSTGRES_PORT} 
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    networks: [internal]

  # -----------------------------
  # Accès à la db en dev (adminer)
  # -----------------------------
  adminer:
    image: adminer:latest
    container_name: ft_transcendence_adminer
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - postgres
    networks: [internal]

  # -----------------------------
  # Cache & Temps réel (Redis)
  # -----------------------------
  redis:
    image: redis:7
    container_name: ft_transcendence_redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6380:6379"
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    networks: [internal]

  # -----------------------------
  # Backend (NestJS)
  # -----------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ft_transcendence_backend
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks: [internal]
    # Command pour le dev (hot reload)
    command: npm run start:dev

  # -----------------------------
  # Frontend (React + Vite)
  # -----------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ft_transcendence_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always
    depends_on:
      - backend
    networks: [internal]

  # -----------------------------
  # Nginx (WAP)
  # -----------------------------
  nginx:
    build:
      context: ./backend/WAP
      dockerfile: Dockerfile
    container_name: ft_transcendence_wap
    environment:
      - PARANOIA=1
      - ANOMALY_INBOUND=10
      - DISABLE_DEFAULT_CONF=1
    ports:
      - "443:443"
      - "81:80"
    depends_on:
      - postgres
      - redis
      - backend
      - frontend
    networks: [internal]

# volumes:
#   ./data:/var/lib/postgresql/data

networks:
  internal:
    driver: bridge