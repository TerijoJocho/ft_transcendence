# version: '3.8'

services:
  # -----------------------------
  # Base de données (PostgreSQL)
  # -----------------------------
  postgres:
    image: postgres:15
    container_name: ft_transcendence_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST} 
      POSTGRES_PORT: ${POSTGRES_PORT} 
    ports:
      - "5433:5432"
    volumes:
      - ./data:/var/lib/postgresql/data

  # -----------------------------
  # Cache & Temps réel (Redis)
  # -----------------------------
  redis:
    image: redis:7
    container_name: ft_transcendence_redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]

  # -----------------------------
  # Backend (NestJS)
  # -----------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ft_transcendence_backend
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
    expose:
        - "3000"
#     ports:
#       - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - postgres
      # - redis
    # Command pour le dev (hot reload)
    command: npm run start:dev

  # -----------------------------
  # Nginx (WAP)
  # -----------------------------

  nginx:
    build:
      context: ./backend/WAP
      dockerfile: Dockerfile
    container_name: ft_transcendence_wap
    environment:
      - PARANOIA=2
      - ANOMALY_INBOUND=5
      - DISABLE_DEFAULT_CONF=1
    ports:
      - "443:443"
    depends_on:
      - postgres
      # - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # -----------------------------
  # Frontend (React + Vite)
  # -----------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ft_transcendence_frontend
    ports:
      - "80:80"
    restart: always

